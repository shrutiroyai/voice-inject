# Voice Inject — Custom Vocabulary
# Add terms the LLM should always spell correctly.
# Format: hear (list of phonetic variants) → use (correct spelling)

corrections:
  - hear: ["year over year", "y o y", "why oh why"]
    use: "YoY"
  - hear: ["alkie", "alkee", "alky", "al ki", "alki"]
    use: "Alki"
  - hear: ["gen bi", "gen b i", "jenbi", "jen bi"]
    use: "GenBI"
  - hear: ["store front"]
    use: "Storefront"
  - hear: ["click through conversion", "c t c", "see tee see"]
    use: "CtC"
  - hear: ["bedrock"]
    use: "Bedrock"
  - hear: ["sim ticket", "sim t"]
    use: "SIM ticket"
  - hear: ["w b r", "weekly business review"]
    use: "WBR"
  - hear: ["e t d", "event to date"]
    use: "ETD"
  - hear: ["l w", "last week"]
    use: "LW"
  - hear: ["m t d", "month to date"]
    use: "MTD"
